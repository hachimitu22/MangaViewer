# /api/logout
post:
  summary: ログアウト処理
  description: session_token Cookie による認証済みセッションを破棄する。
  security:
    - cookieAuth: []
  responses:
    "200":
      description: ログアウト成否
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                description: ログアウト成否
          examples:
            success:
              summary: ログアウト成功
              value: {
                code: 0
              }
            fail:
              summary: ログアウト失敗
              value: {
                code: 1
              }
    "401":
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedApi'
