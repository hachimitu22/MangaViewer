# /api/logout
post:
  summary: ログアウト処理
  description: session_token Cookie による認証済みセッションを破棄する。
  security:
    - cookieAuth: []
  parameters:
    - name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
      description: セッションに紐づくCSRFトークン
  responses:
    "200":
      description: ログアウト結果
      content:
        application/json:
          examples:
            success:
              value: { code: 0 }
            fail:
              value: { code: 1 }
    "401":
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedApi'
    "403":
      description: CSRF検証またはOrigin検証に失敗
      content:
        application/json:
          examples:
            forbidden:
              value: { message: Forbidden }
    "500":
      description: サーバー内部エラー
      content:
        application/json:
          examples:
            internalError:
              value: { message: Internal Server Error }
