# /api/media
post:
  summary: メディア登録処理
  security:
    - cookieAuth: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            title:
              description: メディアタイトル
              type: string
            contents:
              description: コンテンツ一覧
              type: array
              items:
                type: object
                properties:
                  file:
                    description: ファイル
                    type: string
                    format: binary
                  position:
                    description: コンテンツ位置
                    type: integer
        examples:
          sample1:
            summary: 画像2枚で登録
            value:
              title: サンプルタイトル
              contents: [
                {
                  file: example1.jpg,
                  position: 1,
                },
                {
                  file: example2.png,
                  position: 2,
                },
              ]
  responses:
    "200":
      description: メディア登録成功
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                description: 登録成否
              mediaId:
                type: integer
                description: メディアID
          examples:
            success:
              summary: 登録成功
              value: {
                code: 0,
                mediaId: 1
              }
            fail:
              summary: 登録失敗
              value: {
                code: 1
              }
    "401":
      $ref: '../../openapi.yaml#/components/responses/UnauthorizedApi'
