# /
get:
  summary: ルート画面遷移
  responses:
    "302":
      description: 認証状態に応じた画面リダイレクト
      headers:
        Location:
          description: リダイレクト先URL（`/screen/login` または `/screen/summary`）
          schema:
            type: string
            enum:
              - /screen/login
              - /screen/summary
