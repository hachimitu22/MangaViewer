paths:
  /login:
    post:
      summary: ログイン画面
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  description: ユーザー名
                  type: string
                password:
                  description: パスワード
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          description: ログイン成功、セッション発行＋トップページHTML
          headers:
            Set-Cookie:
              description: セッショントークン
              schema:
                type: string
          content:
            text/html:
              schema:
                type: string
